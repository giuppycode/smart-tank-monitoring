<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tank Monitoring System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">TMS <span>//</span> Tank Monitoring System</div>
      <div id="clock">--:--:--</div>
    </header>

    <div class="grid">
      <div class="card">
        <div class="card-label">System State</div>
        <div id="statusBadge" class="status-badge status-NOT_AVAILABLE">
          <span class="status-dot"></span>
          <span id="statusText">NOT AVAILABLE</span>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Water Level (Distance)</div>
        <div class="big-value" id="distValue">--</div>
        <div class="big-unit">CM</div>
      </div>

      <div class="card">
        <div class="card-label">Valve Opening</div>
        <div class="valve-value" id="valveValue">--%</div>
        <div class="valve-track">
          <div class="valve-fill" id="valveFill" style="width: 0%"></div>
        </div>
        <div class="valve-labels">
          <span>0%</span><span>50%</span><span>100%</span>
        </div>
      </div>

      <div class="card span2">
        <div class="card-label">Level History (last N readings)</div>
        <div class="chart-wrap">
          <canvas id="levelChart"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Controls</div>
        <div class="controls">
          <button id="btnAuto" class="btn btn-auto" onclick="setMode('AUTOMATIC')">
            ▶ Set Automatic
          </button>
          <button id="btnManual" class="btn btn-manual" onclick="setMode('MANUAL')">
            ✎ Set Manual
          </button>

          <div
            class="slider-wrap"
            id="sliderWrap"
          >
            <label>VALVE CONTROL (MANUAL ONLY)</label>
            <input
              type="range"
              min="0"
              max="100"
              value="0"
              id="valveSlider"
              oninput="updateSliderValue(this)"
            />
            <div class="slider-value" id="sliderValue">0%</div>
          </div>
        </div>

        <div class="footer-row">
          <div class="conn-dot conn-err" id="connDot"></div>
          <div id="connLabel">NOT CONNECTED</div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
